<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d2b0d" />
  <title>Contador de Coco Verde</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-deep: #0d2b0d; --green-bright: #2d8a2d; --green-neon: #4dff6e;
      --yellow-coco: #c8e64a; --white: #f0f5e8; --gray: #8aab8a; --accent: #ff6b35;
    }
    html, body { height: 100%; background: var(--green-deep); color: var(--white); font-family: 'IBM Plex Mono', monospace; overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100dvh; position: relative; }
    #header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; background: linear-gradient(to bottom, rgba(13,43,13,0.97) 70%, transparent); }
    #title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--yellow-coco); text-shadow: 0 0 14px rgba(200,230,74,0.5); }
    #header-right { display: flex; align-items: center; gap: 12px; }
    #btn-historico { background: rgba(200,230,74,0.12); border: 1.5px solid var(--yellow-coco); color: var(--yellow-coco); font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 1px; padding: 7px 15px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
    #btn-historico:active { background: rgba(200,230,74,0.25); transform: scale(0.95); }
    #status-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--gray); transition: background 0.3s, box-shadow 0.3s; }
    #status-dot.active { background: var(--green-neon); box-shadow: 0 0 10px var(--green-neon); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #camera-wrap { flex: 1; position: relative; background: #000; overflow: hidden; }
    #video { width: 100%; height: 100%; object-fit: cover; display: block; }
    #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
    #camera-wrap::after { content: ''; position: absolute; inset: 0; pointer-events: none; z-index: 3; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px); }
    .corner { position: absolute; width: 36px; height: 36px; border-color: var(--yellow-coco); border-style: solid; opacity: 0.7; z-index: 4; }
    .corner.tl { top: 16px; left: 16px; border-width: 3px 0 0 3px; }
    .corner.tr { top: 16px; right: 16px; border-width: 3px 3px 0 0; }
    .corner.bl { bottom: 16px; left: 16px; border-width: 0 0 3px 3px; }
    .corner.br { bottom: 16px; right: 16px; border-width: 0 3px 3px 0; }
    #counter-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -52%); z-index: 5; text-align: center; pointer-events: none; width: 90vw; }
    #big-count { font-family: 'Bebas Neue', sans-serif; font-size: clamp(130px, 44vw, 230px); line-height: 0.88; color: var(--yellow-coco); text-shadow: 0 0 30px rgba(200,230,74,0.8), 0 0 80px rgba(200,230,74,0.35), 3px 3px 0 rgba(0,0,0,0.6); transition: transform 0.1s; }
    #big-count.bump { transform: scale(1.12); }
    #count-label { font-size: 17px; letter-spacing: 5px; color: var(--green-neon); text-transform: uppercase; opacity: 0.9; margin-top: 6px; font-weight: 700; text-shadow: 0 0 10px rgba(77,255,110,0.5); }
    #bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; z-index: 10; padding: 16px 20px 32px; background: linear-gradient(to top, rgba(13,43,13,0.98) 70%, transparent); display: flex; align-items: center; gap: 14px; }
    #stats-row { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .stat-line { display: flex; justify-content: space-between; align-items: center; font-size: 15px; color: var(--gray); }
    .stat-line span:last-child { color: var(--white); font-weight: 700; font-size: 16px; }
    #confidence-bar-wrap { height: 4px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin-top: 2px; }
    #confidence-bar { height: 100%; background: var(--green-neon); width: 0%; transition: width 0.3s; border-radius: 3px; }
    .btn { border: none; border-radius: 14px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; touch-action: manipulation; }
    .btn:active { transform: scale(0.93); }
    #btn-salvar { background: rgba(77,255,110,0.15); border: 1.5px solid var(--green-neon); color: var(--green-neon); font-size: 13px; padding: 12px 14px; }
    #btn-salvar:active { background: rgba(77,255,110,0.3); }
    #btn-manual { background: var(--yellow-coco); color: var(--green-deep); font-size: 30px; padding: 16px 24px; border-radius: 18px; font-weight: 700; box-shadow: 0 4px 20px rgba(200,230,74,0.3); }
    #btn-manual:active { background: #a8c030; }
    #loading { position: absolute; inset: 0; z-index: 100; background: var(--green-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 36px; }
    #loading-icon { font-size: 72px; animation: bob 2s ease-in-out infinite; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    #loading-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; color: var(--yellow-coco); letter-spacing: 3px; text-align: center; line-height: 1.1; }
    #loading-msg { font-size: 15px; color: var(--gray); text-align: center; line-height: 1.9; }
    #progress-wrap { width: 220px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    #progress-bar { height: 100%; background: var(--yellow-coco); width: 0%; transition: width 0.5s; border-radius: 4px; }
    #btn-start { background: var(--yellow-coco); color: var(--green-deep); font-size: 16px; letter-spacing: 2px; padding: 18px 36px; border-radius: 18px; display: none; font-weight: 700; box-shadow: 0 4px 24px rgba(200,230,74,0.4); }
    #notif { position: absolute; top: 76px; left: 50%; transform: translateX(-50%); z-index: 20; background: rgba(77,255,110,0.15); border: 1.5px solid var(--green-neon); color: var(--green-neon); font-size: 14px; font-weight: 700; letter-spacing: 2px; padding: 8px 20px; border-radius: 24px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
    #notif.show { opacity: 1; }
    #mode-badge { position: absolute; top: 68px; right: 16px; z-index: 9; background: rgba(13,43,13,0.9); border: 1.5px solid var(--green-bright); color: var(--green-neon); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; padding: 5px 10px; border-radius: 8px; text-transform: uppercase; }
    #modal-historico { position: absolute; inset: 0; z-index: 200; background: rgba(13,43,13,0.98); display: none; flex-direction: column; }
    #modal-historico.open { display: flex; }
    #modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 14px; border-bottom: 1px solid rgba(200,230,74,0.2); flex-shrink: 0; }
    #modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--yellow-coco); letter-spacing: 2px; }
    #btn-fechar { background: rgba(255,107,53,0.15); border: 1.5px solid var(--accent); color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; padding: 9px 18px; border-radius: 12px; cursor: pointer; }
    #btn-fechar:active { background: rgba(255,107,53,0.3); transform: scale(0.95); }
    #modal-resumo { display: flex; border-bottom: 1px solid rgba(200,230,74,0.15); flex-shrink: 0; }
    .resumo-item { flex: 1; text-align: center; padding: 18px 10px; border-right: 1px solid rgba(200,230,74,0.1); }
    .resumo-item:last-child { border-right: none; }
    .resumo-num { font-family: 'Bebas Neue', sans-serif; font-size: 46px; color: var(--yellow-coco); line-height: 1; text-shadow: 0 0 16px rgba(200,230,74,0.4); }
    .resumo-label { font-size: 12px; color: var(--gray); letter-spacing: 1px; margin-top: 4px; text-transform: uppercase; }
    #lista-historico { flex: 1; overflow-y: auto; padding: 8px 20px 12px; }
    .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,0.07); gap: 12px; }
    .hist-item:last-child { border-bottom: none; }
    .hist-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gray); min-width: 32px; text-align: right; }
    .hist-cocos { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--yellow-coco); flex: 1; text-align: center; }
    .hist-info { text-align: right; }
    .hist-hora { font-size: 15px; color: var(--white); font-weight: 700; }
    .hist-data { font-size: 13px; color: var(--gray); margin-top: 2px; }
    .hist-tipo { font-size: 11px; color: var(--gray); margin-top: 2px; letter-spacing: 1px; }
    .hist-vazio { text-align: center; color: var(--gray); font-size: 15px; padding: 60px 0; line-height: 2.2; }
    #btn-limpar-hist { background: rgba(255,107,53,0.1); border: 1.5px solid rgba(255,107,53,0.4); color: var(--accent); font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 700; padding: 14px; border-radius: 14px; cursor: pointer; margin: 0 20px 28px; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
    #btn-limpar-hist:active { background: rgba(255,107,53,0.25); }
  </style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div id="loading-icon">🥥</div>
    <div id="loading-title">Contador de<br>Coco Verde</div>
    <div id="loading-msg">Carregando modelo offline...<br>Primeira vez pode demorar um pouco.</div>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <button class="btn" id="btn-start" onclick="startCamera()">▶ Iniciar Câmera</button>
  </div>
  <div id="header">
    <div id="title">🥥 CocoCount</div>
    <div id="header-right">
      <button id="btn-historico" onclick="abrirHistorico()">HISTÓRICO</button>
      <div id="status-dot"></div>
    </div>
  </div>
  <div id="mode-badge">Carregando...</div>
  <div id="notif"></div>
  <div id="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="counter-overlay">
      <div id="big-count">0</div>
      <div id="count-label">cocos detectados</div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="stats-row">
      <div class="stat-line"><span>Total da sessão</span><span id="session-count">0 cocos</span></div>
      <div class="stat-line"><span>Confiança IA</span><span id="confidence-val">–</span></div>
      <div id="confidence-bar-wrap"><div id="confidence-bar"></div></div>
      <div class="stat-line" style="margin-top:2px"><span>FPS</span><span id="fps-val">–</span></div>
    </div>
    <button class="btn" id="btn-salvar" onclick="registrarContagem()">✔ SALVAR</button>
    <button class="btn" id="btn-manual" onclick="manualAdd()">+1</button>
  </div>
  <div id="modal-historico">
    <div id="modal-header">
      <div id="modal-title">📋 Histórico</div>
      <button id="btn-fechar" onclick="fecharHistorico()">✕ Fechar</button>
    </div>
    <div id="modal-resumo">
      <div class="resumo-item"><div class="resumo-num" id="resumo-total">0</div><div class="resumo-label">Total</div></div>
      <div class="resumo-item"><div class="resumo-num" id="resumo-registros">0</div><div class="resumo-label">Registros</div></div>
      <div class="resumo-item"><div class="resumo-num" id="resumo-media">0</div><div class="resumo-label">Média</div></div>
    </div>
    <div id="lista-historico"></div>
    <button id="btn-limpar-hist" onclick="limparHistorico()">🗑 Limpar Todo o Histórico</button>
  </div>
</div>
<script>
  // ===== CONFIGURAÇÃO =====
  const CONFIDENCE_THRESHOLD = 0.25;
  const INFERENCE_INTERVAL_MS = 3000;
  const INPUT_SIZE = 640;
  // URL do modelo no GitHub Pages (ajuste para seu usuário)
  const MODEL_URL = './model.json';
  // ========================

  let model = null, isRunning = false;
  let sessionTotal = 0, lastDetected = -1;
  let lastFpsTime = Date.now(), frameCount = 0, notifTimer = null;
  let lastInferenceTime = 0;
  let historico = [];
  try { historico = JSON.parse(localStorage.getItem('coco_historico') || '[]'); } catch(e) {}

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const bigCount = document.getElementById('big-count');
  const sessionCountEl = document.getElementById('session-count');
  const confidenceVal = document.getElementById('confidence-val');
  const confidenceBar = document.getElementById('confidence-bar');
  const fpsVal = document.getElementById('fps-val');
  const statusDot = document.getElementById('status-dot');
  const loadingEl = document.getElementById('loading');
  const loadingMsg = document.getElementById('loading-msg');
  const progressBar = document.getElementById('progress-bar');
  const btnStart = document.getElementById('btn-start');
  const notif = document.getElementById('notif');
  const modeBadge = document.getElementById('mode-badge');

  async function loadModel() {
    try {
      loadingMsg.innerHTML = 'Carregando modelo offline...<br>Aguarde, só precisa fazer isso uma vez.';
      progressBar.style.width = '30%';
      model = await tf.loadGraphModel(MODEL_URL);
      progressBar.style.width = '100%';
      loadingMsg.innerHTML = '✅ Modelo carregado!<br>Funciona 100% offline 🎉';
      modeBadge.textContent = '🥥 OFFLINE';
      modeBadge.style.color = '#c8e64a';
      modeBadge.style.borderColor = '#c8e64a';
    } catch(e) {
      progressBar.style.width = '100%';
      loadingMsg.innerHTML = '⚠️ Erro ao carregar modelo.<br>' + e.message;
      modeBadge.textContent = 'Erro';
      modeBadge.style.color = '#ff6b35';
    }
    btnStart.style.display = 'block';
  }

  async function startCamera() {
    btnStart.style.display = 'none';
    loadingMsg.textContent = 'Acessando câmera...';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        loadingEl.style.display = 'none';
        isRunning = true;
        statusDot.classList.add('active');
        requestAnimationFrame(loop);
      };
    } catch(e) {
      loadingMsg.innerHTML = '❌ Câmera não disponível.<br>Verifique as permissões.';
      btnStart.style.display = 'block';
      btnStart.textContent = '🔄 Tentar novamente';
    }
  }

  async function runInference() {
    if (!model) return [];
    try {
      // Prepara imagem
      const tensor = tf.tidy(() => {
        return tf.image.resizeBilinear(
          tf.browser.fromPixels(video), [INPUT_SIZE, INPUT_SIZE]
        ).div(255.0).expandDims(0);
      });

      const result = await model.executeAsync(tensor);
      tensor.dispose();

      // Processa resultado YOLOv8
      const data = Array.isArray(result) ? result[0] : result;
      const rawData = await data.array();
      if (Array.isArray(result)) result.forEach(t => t.dispose());
      else result.dispose();

      // YOLOv8 output: [1, 5, 8400] -> transpor para [8400, 5]
      const predictions = [];
      const output = rawData[0]; // [5, 8400]
      const numDetections = output[0].length;

      for (let i = 0; i < numDetections; i++) {
        const confidence = output[4][i];
        if (confidence > CONFIDENCE_THRESHOLD) {
          const cx = output[0][i];
          const cy = output[1][i];
          const w  = output[2][i];
          const h  = output[3][i];
          predictions.push({ x: cx, y: cy, width: w, height: h, confidence });
        }
      }

      // NMS simples para remover duplicatas
      return nms(predictions);
    } catch(e) {
      console.error('Inference error:', e);
      return [];
    }
  }

  function nms(preds, iouThreshold = 0.45) {
    if (preds.length === 0) return [];
    preds.sort((a, b) => b.confidence - a.confidence);
    const keep = [];
    const used = new Set();
    for (let i = 0; i < preds.length; i++) {
      if (used.has(i)) continue;
      keep.push(preds[i]);
      for (let j = i + 1; j < preds.length; j++) {
        if (iou(preds[i], preds[j]) > iouThreshold) used.add(j);
      }
    }
    return keep;
  }

  function iou(a, b) {
    const ax1 = a.x - a.width/2, ay1 = a.y - a.height/2;
    const ax2 = a.x + a.width/2, ay2 = a.y + a.height/2;
    const bx1 = b.x - b.width/2, by1 = b.y - b.height/2;
    const bx2 = b.x + b.width/2, by2 = b.y + b.height/2;
    const ix = Math.max(0, Math.min(ax2,bx2) - Math.max(ax1,bx1));
    const iy = Math.max(0, Math.min(ay2,by2) - Math.max(ay1,by1));
    const inter = ix * iy;
    const union = (ax2-ax1)*(ay2-ay1) + (bx2-bx1)*(by2-by1) - inter;
    return inter / union;
  }

  function drawDetections(preds) {
    canvas.width = video.videoWidth || 640;
    canvas.height = video.videoHeight || 480;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const sx = canvas.width / INPUT_SIZE;
    const sy = canvas.height / INPUT_SIZE;
    for (const p of preds) {
      const x = (p.x - p.width/2) * sx;
      const y = (p.y - p.height/2) * sy;
      const w = p.width * sx;
      const h = p.height * sy;
      ctx.strokeStyle = '#c8e64a'; ctx.lineWidth = 3;
      ctx.shadowColor = '#c8e64a'; ctx.shadowBlur = 10;
      ctx.strokeRect(x, y, w, h); ctx.shadowBlur = 0;
      ctx.fillStyle = '#c8e64a'; ctx.font = '700 14px monospace';
      ctx.fillText(`🥥 ${Math.round(p.confidence*100)}%`, x+6, y-8);
    }
  }

  async function loop() {
    if (!isRunning) return;
    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) { fpsVal.textContent = frameCount+' fps'; frameCount=0; lastFpsTime=now; }
    if (now - lastInferenceTime >= INFERENCE_INTERVAL_MS) {
      lastInferenceTime = now;
      const preds = await runInference();
      drawDetections(preds);
      updateDisplay(preds);
    }
    requestAnimationFrame(loop);
  }

  function updateDisplay(preds) {
    const detected = preds.length;
    const maxConf = preds.length > 0 ? Math.max(...preds.map(p => p.confidence)) : 0;
    if (bigCount.textContent !== String(detected)) {
      bigCount.textContent = detected;
      bigCount.classList.remove('bump'); void bigCount.offsetWidth; bigCount.classList.add('bump');
      setTimeout(() => bigCount.classList.remove('bump'), 150);
    }
    if (maxConf > 0) { confidenceVal.textContent = Math.round(maxConf*100)+'%'; confidenceBar.style.width = Math.round(maxConf*100)+'%'; }
    else { confidenceVal.textContent = '–'; confidenceBar.style.width = '0%'; }
    if (detected !== lastDetected) {
      if (detected > 0) {
        const diff = detected - Math.max(lastDetected, 0);
        if (diff > 0) {
          sessionTotal += diff;
          sessionCountEl.textContent = sessionTotal + ' cocos';
          showNotif('+' + diff + ' coco' + (diff>1?'s':'') + ' detectado' + (diff>1?'s':'') + '!');
        }
      }
      lastDetected = detected;
    }
  }

  function showNotif(msg) {
    notif.textContent = msg; notif.classList.add('show');
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => notif.classList.remove('show'), 2500);
  }

  function manualAdd() {
    sessionTotal++;
    sessionCountEl.textContent = sessionTotal+' cocos';
    bigCount.textContent = parseInt(bigCount.textContent)+1;
    bigCount.classList.remove('bump'); void bigCount.offsetWidth; bigCount.classList.add('bump');
    setTimeout(() => bigCount.classList.remove('bump'), 150);
    showNotif('+1 adicionado manualmente');
  }

  function registrarContagem() {
    if (sessionTotal === 0) { showNotif('Nenhum coco para salvar!'); return; }
    const agora = new Date();
    historico.unshift({ cocos: sessionTotal, hora: agora.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}), data: agora.toLocaleDateString('pt-BR'), tipo: 'Offline IA' });
    try { localStorage.setItem('coco_historico', JSON.stringify(historico)); } catch(e) {}
    const saved = sessionTotal;
    sessionTotal = 0; sessionCountEl.textContent = '0 cocos'; bigCount.textContent = '0'; lastDetected = -1;
    showNotif(`✅ ${saved} cocos salvos!`);
  }

  function abrirHistorico() { renderHistorico(); document.getElementById('modal-historico').classList.add('open'); }
  function fecharHistorico() { document.getElementById('modal-historico').classList.remove('open'); }

  function renderHistorico() {
    const lista = document.getElementById('lista-historico');
    const totalGeral = historico.reduce((a,b) => a+b.cocos, 0);
    const media = historico.length > 0 ? Math.round(totalGeral/historico.length) : 0;
    document.getElementById('resumo-total').textContent = totalGeral;
    document.getElementById('resumo-registros').textContent = historico.length;
    document.getElementById('resumo-media').textContent = media;
    if (historico.length === 0) { lista.innerHTML = '<div class="hist-vazio">🥥<br>Nenhum registro ainda.<br>Use o botão ✔ SALVAR<br>para registrar uma contagem.</div>'; return; }
    lista.innerHTML = historico.map((item,i) => `<div class="hist-item"><div class="hist-num">#${historico.length-i}</div><div class="hist-cocos">${item.cocos} 🥥</div><div class="hist-info"><div class="hist-hora">${item.hora}</div><div class="hist-data">${item.data}</div><div class="hist-tipo">${item.tipo}</div></div></div>`).join('');
  }

  function limparHistorico() {
    if (!confirm('Limpar todo o histórico?')) return;
    historico = [];
    try { localStorage.setItem('coco_historico', JSON.stringify(historico)); } catch(e) {}
    renderHistorico(); showNotif('Histórico limpo!');
  }

  loadModel();
</script>
</body>
</html>
